name: CI

on:
  push:
    branches: [v13/main]
  pull_request:
    branches: [v13/main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Ideo.Umbraco.MediaManager.slnx

      - name: Build
        run: dotnet build Ideo.Umbraco.MediaManager.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Ideo.Umbraco.MediaManager.slnx -c Release --no-build --verbosity normal
