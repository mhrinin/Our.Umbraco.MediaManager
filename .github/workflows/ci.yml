name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Our.Umbraco.MediaManager/Client/package-lock.json

      - name: Build frontend
        working-directory: src/Our.Umbraco.MediaManager/Client
        run: |
          npm ci
          npm run build

      - name: Restore
        run: dotnet restore Our.Umbraco.MediaManager.slnx

      - name: Build
        run: dotnet build Our.Umbraco.MediaManager.slnx -c Release --no-restore -p:SkipClientBuild=true

      - name: Test
        run: dotnet test Our.Umbraco.MediaManager.slnx -c Release --no-build --verbosity normal
