name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC / NuGet Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Ideo.Umbraco.MediaManager/Client/package-lock.json

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        working-directory: src/Ideo.Umbraco.MediaManager/Client
        run: |
          npm ci
          npm run build

      - name: Pack
        run: >
          dotnet pack src/Ideo.Umbraco.MediaManager/Ideo.Umbraco.MediaManager.csproj
          -c Release
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -p:SkipClientBuild=true
          -o artifacts

      # Exchange the GitHub OIDC token for a short-lived nuget.org API key (Trusted Publishing).
      # Configure the matching policy at nuget.org → your username → Trusted Publishing.
      - name: NuGet login (Trusted Publishing / OIDC)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to nuget.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --skip-duplicate
